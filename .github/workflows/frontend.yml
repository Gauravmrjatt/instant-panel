name: Build & Push Frontend

on:
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Set version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=dev-${GITHUB_SHA}" >> $GITHUB_ENV
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 CACHE-BUST VARIABLE (CRITICAL)
      - name: Set cache bust
        run: echo "CACHE_BUST=${GITHUB_SHA}" >> $GITHUB_ENV

      # 🔥 BUILD (FIXED)
      - uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true

          # 🔥 IMPORTANT BUILD ARGS
          build-args: |
            NEXT_PUBLIC_API_URL=https://backend5.logicpay.in
            CACHE_BUST=${{ env.CACHE_BUST }}

          tags: |
            ghcr.io/${{ env.OWNER_LC }}/instant-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/instant-frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/instant-frontend:${{ env.VERSION }}

          # ✅ KEEP CACHE BUT SAFE
          cache-from: type=gha
          cache-to: type=gha,mode=max