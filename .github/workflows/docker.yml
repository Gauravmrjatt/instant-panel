name: Build & Push (Frontend + Backend)
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # 🔥 required for GHCR

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 🔥 Backend Build
      # =========================
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/instant-backend:latest
            ghcr.io/${{ github.repository_owner }}/instant-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # 🔥 Frontend Build
      # =========================
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/instant-frontend:latest
            ghcr.io/${{ github.repository_owner }}/instant-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max